<turbo-frame id="like-{{ obj.pk }}">
    <form
	method="post"
	{% if was_liked_by %}
	    action="{{ unlike_url }}"
	{% else %}
	    action="{{ like_url }}"
	{% endif %}
    >
	{% csrf_token %}
	<button class="btn btn--outline-primary btn--sm">
	    {% if was_liked_by %}
		{% heroicon_solid 'hand-thumb-up' class="btn__icon" %}
	    {% else %}
		{% heroicon_outline 'hand-thumb-up' class="btn__icon" %}
	    {% endif %}
	    {{ likes }}
	</button>
    </form>
</turbo-frame>
