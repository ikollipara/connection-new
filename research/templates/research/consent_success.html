<turbo-frame id="research__open_to_studies">
    <div class="stack">
	{% if did_consent %}
	    <h3>Thank you!</h3>
	    <p>Your work will help us advance the future of CS Ed.</p>
	    <div class="button-group">
		<a class="btn btn--primary" href="">Check out available studies!</a>
		<button commandfor="consent_dialog" command="close" class="btn btn--outline-primary">Close</button>
	    </div>
	{% else %}
	    <h3>No Worries!</h3>
	    <p>conneCTION will still continue to work for you, and I hope you are able to gain something from it.</p>
	    <div class="button-group">
		<button commandfor="consent_dialog" command="close" class="btn btn--primary">Close</button>
	    </div>
	{% endif %}
    </div>
</turbo-frame>
